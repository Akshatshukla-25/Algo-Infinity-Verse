<section id="topic-of-the-day" class="hp-section">
  <div class="hp-facts-card" style="background: var(--hp-card); border: 1px solid var(--hp-card-border);">
    <div class="hp-facts-header">
      <div class="hp-facts-title">
        <span class="hp-facts-icon"><i class="fas fa-calendar-day"></i></span>
        <h3>Topic of the Day</h3>
      </div>
    </div>
    <div class="hp-facts-content" style="display: flex; align-items: center; gap: 24px; flex-wrap: wrap;">
      <div class="hp-topic-icon" id="totdIcon" style="font-size: 2.5rem; margin: 0; color: var(--hp-lavender);"></div>
      <div style="flex: 1; min-width: 200px;">
        <h2 class="hp-visualizer-info-title" id="totdTitle" style="font-size: 1.4rem; margin: 0 0 8px;"></h2>
        <p class="hp-visualizer-info-desc" id="totdDesc" style="margin: 0 0 12px;"></p>
        <div style="display: flex; gap: 16px; font-family: 'Inter', sans-serif; font-size: 0.82rem; color: var(--hp-text-tertiary);">
          <span class="totd-difficulty" id="totdDifficulty"></span>
          <span class="totd-problems" id="totdProblems"></span>
        </div>
      </div>
      <button type="button" class="hp-btn hp-btn-primary totd-btn" id="totdBtn" style="flex-shrink: 0;">
        <i class="fas fa-book-open"></i> Learn Now
      </button>
    </div>
  </div>
</section>
