<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="aws-academy.css">
    <link rel="stylesheet" href="/styles/eli5-toggle.css">
    <link rel="stylesheet" href="/styles/copy-code.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex overflow-hidden">

    <button id="mobile-menu-btn" class="md:hidden fixed top-4 right-4 z-50 p-2 bg-orange-500 text-white rounded shadow-lg">
        <i class="fas fa-bars"></i>
    </button>

    <aside id="sidebar" class="w-72 bg-white border-r border-gray-200 h-full flex flex-col transition-transform duration-300 absolute md:relative z-40 -translate-x-full md:translate-x-0">
        <div class="p-4 border-b border-gray-200 bg-orange-50 flex items-center gap-3">
            <i class="fab fa-aws text-orange-500 text-3xl"></i>
            <h1 class="font-bold text-lg text-orange-900 leading-tight">AWS Academy</h1>
        </div>

        <div class="p-4 border-b border-gray-200">
            <div class="flex justify-between text-xs mb-1 font-semibold text-gray-500">
                <span>Progress</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2">
                <div id="progress-bar" class="bg-orange-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div id="sidebar-content" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">

        </div>
    </aside>

    <main class="flex-1 h-full flex flex-col relative w-full">
        <header class="bg-white border-b border-gray-200 px-6 py-4 flex space-x-4 shadow-sm z-10 overflow-x-auto">
            <button class="tab-btn active px-4 py-2 font-medium rounded-t-lg border-b-2 border-orange-500 text-orange-600 transition-colors whitespace-nowrap" data-tab="lesson">
                <i class="fas fa-book-open mr-2"></i>Lesson Viewer
            </button>
            <button class="tab-btn px-4 py-2 font-medium text-gray-500 hover:text-orange-600 transition-colors whitespace-nowrap" data-tab="simulator">
                <i class="fas fa-cubes mr-2"></i>Architecture Simulator
            </button>
            <button class="tab-btn px-4 py-2 font-medium text-gray-500 hover:text-orange-600 transition-colors whitespace-nowrap" data-tab="quiz">
                <i class="fas fa-tasks mr-2"></i>Quiz
            </button>
            <button class="tab-btn px-4 py-2 font-medium text-gray-500 hover:text-orange-600 transition-colors whitespace-nowrap" data-tab="lab">
                <i class="fas fa-flask mr-2"></i>Lab Guide
            </button>
        </header>

        <div class="flex-1 overflow-y-auto relative bg-gray-50 custom-scrollbar">

            <div id="lesson-tab" class="tab-pane absolute inset-0 p-4 md:p-8 fade-in block">
                <div id="lesson-content" class="max-w-3xl mx-auto bg-white p-6 md:p-8 rounded-xl shadow-sm border border-gray-100">

                </div>
            </div>

            <div id="simulator-tab" class="tab-pane absolute inset-0 hidden fade-in h-full flex flex-col">

                <div class="bg-white border-b border-gray-200 p-3 flex flex-wrap gap-2 shadow-sm shrink-0 items-center">
                    <span class="text-sm font-semibold text-gray-600 mr-2"><i class="fas fa-tools mr-2"></i>Toolbox:</span>
                    <button class="add-service-btn bg-white border border-gray-300 hover:border-orange-500 hover:text-orange-600 text-gray-700 px-3 py-1.5 rounded text-sm font-medium transition-colors shadow-sm flex items-center" data-type="EC2" data-cost="15" data-icon="fa-server">
                        <i class="fas fa-server text-orange-500 mr-2"></i>EC2
                    </button>
                    <button class="add-service-btn bg-white border border-gray-300 hover:border-green-600 hover:text-green-700 text-gray-700 px-3 py-1.5 rounded text-sm font-medium transition-colors shadow-sm flex items-center" data-type="S3" data-cost="2.5" data-icon="fa-hdd">
                        <i class="fas fa-hdd text-green-600 mr-2"></i>S3
                    </button>
                    <button class="add-service-btn bg-white border border-gray-300 hover:border-blue-600 hover:text-blue-700 text-gray-700 px-3 py-1.5 rounded text-sm font-medium transition-colors shadow-sm flex items-center" data-type="RDS" data-cost="35" data-icon="fa-database">
                        <i class="fas fa-database text-blue-600 mr-2"></i>RDS
                    </button>
                    <button class="add-service-btn bg-white border border-gray-300 hover:border-purple-600 hover:text-purple-700 text-gray-700 px-3 py-1.5 rounded text-sm font-medium transition-colors shadow-sm flex items-center" data-type="Lambda" data-cost="0.2" data-icon="fa-bolt">
                        <i class="fas fa-bolt text-purple-600 mr-2"></i>Lambda
                    </button>
                    <button class="add-service-btn bg-white border border-gray-300 hover:border-yellow-600 hover:text-yellow-700 text-gray-700 px-3 py-1.5 rounded text-sm font-medium transition-colors shadow-sm flex items-center" data-type="APIGateway" data-cost="3.5" data-icon="fa-plug">
                        <i class="fas fa-plug text-yellow-600 mr-2"></i>API Gateway
                    </button>
                    <button class="add-service-btn bg-white border border-gray-300 hover:border-emerald-600 hover:text-emerald-700 text-gray-700 px-3 py-1.5 rounded text-sm font-medium transition-colors shadow-sm flex items-center" data-type="DynamoDB" data-cost="5" data-icon="fa-database">
                        <i class="fas fa-database text-emerald-600 mr-2"></i>DynamoDB
                    </button>
                    <button class="add-service-btn bg-white border border-gray-300 hover:border-red-600 hover:text-red-700 text-gray-700 px-3 py-1.5 rounded text-sm font-medium transition-colors shadow-sm flex items-center" data-type="ECS" data-cost="20" data-icon="fa-ship">
                        <i class="fas fa-ship text-red-600 mr-2"></i>ECS
                    </button>
                    <button class="add-service-btn bg-white border border-gray-300 hover:border-sky-600 hover:text-sky-700 text-gray-700 px-3 py-1.5 rounded text-sm font-medium transition-colors shadow-sm flex items-center" data-type="CloudFront" data-cost="8.5" data-icon="fa-globe">
                        <i class="fas fa-globe text-sky-600 mr-2"></i>CloudFront
                    </button>
                    <button class="add-service-btn bg-white border border-gray-300 hover:border-violet-600 hover:text-violet-700 text-gray-700 px-3 py-1.5 rounded text-sm font-medium transition-colors shadow-sm flex items-center" data-type="Kinesis" data-cost="12" data-icon="fa-stream">
                        <i class="fas fa-stream text-violet-600 mr-2"></i>Kinesis
                    </button>
                    <div class="ml-auto flex items-center gap-2">
                        <button id="clear-canvas-btn" class="text-red-500 hover:text-red-700 text-sm font-medium px-2 py-1"><i class="fas fa-trash-alt mr-1"></i>Clear All</button>
                    </div>
                </div>

                <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">

                    <div class="flex-[2] relative overflow-hidden blueprint-bg flex items-center justify-center p-4 lg:p-8 border-b lg:border-b-0 lg:border-r border-gray-300">
                        <div class="absolute inset-0 pointer-events-none p-4 opacity-50 flex flex-col items-center justify-center">
                             <div class="w-full h-full max-w-4xl border-2 border-dashed border-gray-400 rounded-xl relative flex items-start justify-start p-6">
                                <div class="absolute -top-3 left-4 bg-gray-100 text-gray-500 px-2 text-xs font-bold uppercase tracking-widest rounded border border-gray-300">VPC Boundary</div>
                             </div>
                        </div>

                        <div id="architecture-canvas" class="w-full h-full max-w-4xl z-10 flex flex-wrap content-start gap-4 p-8 overflow-y-auto custom-scrollbar relative">
                            <div id="canvas-empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 pointer-events-none">
                                <i class="fas fa-mouse-pointer text-3xl mb-2 opacity-50"></i>
                                <p class="text-sm font-medium">Click services in the toolbox to add them to your architecture</p>
                            </div>
                        </div>
                    </div>

                    <div class="flex-1 flex flex-col bg-white overflow-hidden w-full lg:max-w-md shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.05)]">

                        <div class="bg-gradient-to-r from-gray-800 to-gray-900 p-6 text-white border-b border-gray-200">
                            <h3 class="text-gray-300 text-xs uppercase tracking-wider font-semibold mb-1"><i class="fas fa-calculator mr-2"></i>Estimated Monthly Cost</h3>
                            <div class="flex items-baseline">
                                <span class="text-3xl font-bold">$</span>
                                <span id="total-cost" class="text-4xl font-bold ml-1">0.00</span>
                                <span class="text-gray-400 text-sm ml-2">/ mo</span>
                            </div>
                        </div>

                        <div class="flex-1 flex flex-col min-h-0 bg-gray-50">
                            <div class="bg-gray-200 px-4 py-2 border-b border-gray-300 flex justify-between items-center">
                                <span class="font-semibold text-gray-700 text-xs uppercase tracking-wider"><i class="fas fa-code mr-2 text-gray-600"></i>CloudFormation / CDK Template</span>
                            </div>
                            <div id="iac-output" class="flex-1 p-4 overflow-y-auto custom-scrollbar font-mono text-xs text-gray-800 bg-[#f8f9fa] whitespace-pre border-t border-gray-200 shadow-inner">
                                // Add services to generate IaC...
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <div id="quiz-tab" class="tab-pane absolute inset-0 p-4 md:p-8 hidden fade-in">
                <div id="quiz-content" class="max-w-2xl mx-auto bg-white p-6 md:p-8 rounded-xl shadow-sm border border-gray-100">

                </div>
            </div>

            <div id="lab-tab" class="tab-pane absolute inset-0 p-4 md:p-8 hidden fade-in">
                <div id="lab-content" class="max-w-3xl mx-auto bg-white p-6 md:p-8 rounded-xl shadow-sm border border-gray-100">

                </div>
            </div>

        </div>
    </main>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"></div>

    <script src="/modules/eli5-toggle.js"></script>
    <script src="/modules/eli5-aws-data.js"></script>
    <script src="aws-academy-data.js"></script>
    <script src="aws-academy.js"></script>
  <script src="/modules/copy-code.js"></script>
</body>
</html>
