<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Tools — Algo Infinity Verse</title>
  <meta name="description" content="Browse all AI-powered developer tools. Tutors, simulators, profilers, compilers, and creative tools to supercharge your learning." />

  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="ai-tools.css" />

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <script>
    (function() {
      try {
        var t = localStorage.getItem('theme');
        var p = window.matchMedia('(prefers-color-scheme: light)').matches;
        var theme = t || (p ? 'light' : 'dark');
        if (theme === 'light') document.documentElement.classList.add('light-mode');
      } catch (e) {}
    })();
  </script>
</head>
  <body data-page="ai-tools" data-no-loading>
  <div id="loading-screen" class="hidden">
    <div class="loader">
      <div class="infinity-loader">∞</div>
      <h2>Loading AI Tools...</h2>
    </div>
  </div>

  <main>
    <!-- HERO -->
    <section class="ai-hero">
      <div class="ai-hero-bg">
        <div class="ai-hero-glow"></div>
        <div class="ai-hero-orb" aria-hidden="true"></div>
      </div>
      <button type="button" class="ai-back-btn" id="aiBackBtn" aria-label="Go back to previous page">
        <i class="fas fa-arrow-left"></i>
        <span>Back</span>
      </button>
      <div class="ai-hero-content">
        <h1 class="ai-hero-title" data-text="AI Tools">AI Tools</h1>
        <p class="ai-hero-subtitle">
          Experimental, intelligent tools that teach, simulate, analyze, and create — all powered by algorithms running in your browser.
        </p>

        <!-- SEARCH -->
        <div class="ai-search-wrapper">
          <div class="ai-search">
            <i class="fas fa-search ai-search-icon"></i>
            <input
              type="text"
              id="aiSearchInput"
              class="ai-search-input"
              placeholder="Search AI tools..."
              aria-label="Search AI tools"
              autocomplete="off"
            />
            <button type="button" id="aiClearBtn" class="ai-clear-btn" aria-label="Clear search">
              <i class="fas fa-times"></i>
            </button>
            <span class="ai-search-hint">⌘K</span>
          </div>
        </div>

        <!-- FILTER CHIPS -->
        <div class="ai-filters" id="aiFilters" role="tablist" aria-label="AI tool categories"></div>

        <p class="ai-result-count" id="aiResultCount">Showing <span id="aiCountDisplay">0</span> tools</p>
      </div>
    </section>

    <!-- CARD GRID -->
    <section class="ai-section">
      <div class="ai-container">
        <div class="ai-grid" id="aiGrid" role="list">
          <!-- Cards rendered by JS -->
        </div>
        <div class="ai-empty" id="aiEmpty" style="display:none;">
          <i class="fas fa-search-minus"></i>
          <h3>No AI tools found</h3>
          <p>Try adjusting your search or filter.</p>
        </div>
      </div>
    </section>
  </main>

  <script src="/auth.js"></script>
  <script src="/theme.js"></script>
  <script src="/script.js"></script>
  <script src="ai-tools.js"></script>
</body>
</html>
